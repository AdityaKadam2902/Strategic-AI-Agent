<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Debate Engine</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* Glass Effect */
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        /* Typography */
        .title {
            font-size: 3.5rem;
            font-weight: 700;
            color: white;
            text-align: center;
            margin-bottom: 1rem;
        }

        .subtitle {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            margin-bottom: 2rem;
        }

        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Input Section */
        .input-section {
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .label {
            display: block;
            font-size: 1.125rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.75rem;
        }

        .textarea {
            width: 100%;
            padding: 1rem;
            border: 2px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 1rem;
            min-height: 120px;
            resize: vertical;
            transition: border-color 0.2s;
        }

        .textarea:focus {
            outline: none;
            border-color: #8b5cf6;
        }

        .textarea:disabled {
            background: #f3f4f6;
            cursor: not-allowed;
        }

        /* Buttons */
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            color: white;
            font-weight: 600;
            font-size: 1.125rem;
            padding: 1rem 2rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-primary:hover:not(:disabled) {
            transform: scale(1.02);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-example {
            padding: 0.5rem 0.75rem;
            background: #ede9fe;
            color: #7c3aed;
            border: none;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            cursor: pointer;
            transition: background 0.2s;
            margin: 0.25rem;
        }

        .btn-example:hover:not(:disabled) {
            background: #ddd6fe;
        }

        .btn-example:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Loading */
        .loading-spinner {
            display: inline-block;
            border: 3px solid #f3f4f6;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .flex-center {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        /* Agent Status */
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .agent-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            color: #374151;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .status-pending {
            background: #d1d5db;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .status-completed {
            background: #10b981;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Results */
        .results-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .card {
            padding: 2rem;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
        }

        .decision-card {
            display: flex;
            justify-content: space-between;
            align-items: start;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .decision-text {
            flex: 1;
            min-width: 250px;
        }

        .decision-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .decision-subtitle {
            font-size: 1.125rem;
            color: #6b7280;
        }

        .confidence-badge {
            text-align: center;
            min-width: 100px;
        }

        .confidence-score {
            font-size: 3rem;
            font-weight: 700;
        }

        .confidence-label {
            font-size: 0.875rem;
            color: #6b7280;
            font-weight: 500;
        }

        /* Confidence Bar */
        .progress-bar {
            width: 100%;
            height: 12px;
            background: #e5e7eb;
            border-radius: 999px;
            overflow: hidden;
            margin-top: 1.5rem;
        }

        .progress-fill {
            height: 100%;
            border-radius: 999px;
            transition: width 1s ease-out;
        }

        /* Grid Layouts */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .grid-4 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        /* Section Headers */
        .section-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .section-icon {
            font-size: 2rem;
        }

        /* Lists */
        .list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .list-item {
            display: flex;
            gap: 0.75rem;
        }

        .list-number {
            font-weight: 700;
            flex-shrink: 0;
        }

        .list-text {
            color: #374151;
            line-height: 1.6;
        }

        /* Financial Cards */
        .financial-card {
            padding: 1rem;
            border-radius: 0.5rem;
        }

        .financial-label {
            font-size: 0.875rem;
            color: #6b7280;
            margin-bottom: 0.25rem;
        }

        .financial-value {
            font-weight: 600;
            color: #1f2937;
        }

        /* Colors */
        .text-green { color: #059669; }
        .text-yellow { color: #d97706; }
        .text-red { color: #dc2626; }
        .text-blue { color: #2563eb; }
        .text-purple { color: #7c3aed; }

        .bg-green { background: #10b981; }
        .bg-yellow { background: #f59e0b; }
        .bg-red { background: #ef4444; }
        .bg-blue-light { background: #dbeafe; }
        .bg-green-light { background: #d1fae5; }
        .bg-purple-light { background: #ede9fe; }
        .bg-yellow-light { background: #fef3c7; }

        /* Error */
        .error-box {
            padding: 1.5rem;
            border-left: 4px solid #ef4444;
            margin-bottom: 2rem;
        }

        .error-content {
            display: flex;
            gap: 0.75rem;
            align-items: start;
        }

        .error-title {
            font-weight: 600;
            color: #b91c1c;
            font-size: 1.125rem;
            margin-bottom: 0.25rem;
        }

        .error-text {
            color: #dc2626;
        }

        .error-hint {
            font-size: 0.875rem;
            color: #6b7280;
            margin-top: 0.5rem;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 3rem;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.875rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .title {
                font-size: 2.5rem;
            }
            
            .subtitle {
                font-size: 1rem;
            }

            .input-section,
            .card {
                padding: 1.5rem;
            }

            .confidence-score {
                font-size: 2.5rem;
            }

            .decision-title {
                font-size: 1.5rem;
            }
        }

        .example-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
            margin-bottom: 1.5rem;
        }

        .example-label {
            font-size: 0.875rem;
            color: #6b7280;
            margin-bottom: 0.5rem;
        }

        .reasoning-text {
            color: #374151;
            line-height: 1.8;
            font-size: 1.125rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [decision, setDecision] = useState('');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);
            const [agentStatus, setAgentStatus] = useState({});
            const API_URL = 'http://localhost:8000';

            const exampleDecisions = [
                "Should our SaaS company invest $500K in AI-powered features?",
                "Should we expand to Southeast Asian markets?",
                "Should we pivot from B2B to B2C business model?",
                "Should we acquire our main competitor for $10M?",
                "Should we migrate to microservices architecture?"
            ];

            const simulateAgentProgress = () => {
                const agents = ['Pro Agent', 'Con Agent', 'Financial Agent', 'Market Agent', 'Judge Agent', 'Confidence Scorer'];
                let index = 0;
                
                const interval = setInterval(() => {
                    if (index < agents.length) {
                        setAgentStatus(prev => ({
                            ...prev,
                            [agents[index]]: 'completed'
                        }));
                        index++;
                    } else {
                        clearInterval(interval);
                    }
                }, 3000);

                return () => clearInterval(interval);
            };

            const runDebate = async () => {
                if (!decision.trim()) {
                    setError('Please enter a decision to debate');
                    return;
                }

                setLoading(true);
                setError(null);
                setResult(null);
                setAgentStatus({});
                
                simulateAgentProgress();

                try {
                    const response = await fetch(`${API_URL}/debate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ decision }),
                    });

                    if (!response.ok) {
                        throw new Error(`Server error: ${response.status}`);
                    }

                    const data = await response.json();
                    setResult(data);
                } catch (err) {
                    setError(err.message || 'Failed to run debate. Make sure the API server is running.');
                } finally {
                    setLoading(false);
                }
            };

            const getDecisionColor = (decision) => {
                if (decision.toLowerCase().includes('proceed with conditions')) return 'text-yellow';
                if (decision.toLowerCase().includes('proceed')) return 'text-green';
                return 'text-red';
            };

            const getConfidenceColor = (score) => {
                if (score >= 75) return 'bg-green';
                if (score >= 50) return 'bg-yellow';
                return 'bg-red';
            };

            return (
                <div className="container">
                    {/* Header */}
                    <h1 className="title">Strategic Debate Engine</h1>
                    <p className="subtitle">AI-Powered Multi-Agent Decision Analysis</p>

                    {/* Input Section */}
                    <div className="glass-effect input-section">
                        <label className="label">
                            What strategic decision would you like to analyze?
                        </label>
                        <textarea
                            value={decision}
                            onChange={(e) => setDecision(e.target.value)}
                            placeholder="Enter your strategic business decision here..."
                            className="textarea"
                            disabled={loading}
                        />
                        
                        <div className="example-label">Try an example:</div>
                        <div className="example-buttons">
                            {exampleDecisions.map((example, idx) => (
                                <button
                                    key={idx}
                                    onClick={() => setDecision(example)}
                                    disabled={loading}
                                    className="btn-example"
                                >
                                    Example {idx + 1}
                                </button>
                            ))}
                        </div>

                        <button
                            onClick={runDebate}
                            disabled={loading || !decision.trim()}
                            className="btn-primary"
                        >
                            {loading ? (
                                <span className="flex-center">
                                    <div className="loading-spinner"></div>
                                    Running Debate Analysis...
                                </span>
                            ) : (
                                'Start Debate 🚀'
                            )}
                        </button>

                        {loading && (
                            <div className="agent-grid">
                                {['Pro Agent', 'Con Agent', 'Financial Agent', 'Market Agent', 'Judge Agent', 'Confidence Scorer'].map((agent) => (
                                    <div key={agent} className="agent-item">
                                        <div className={`status-dot ${agentStatus[agent] === 'completed' ? 'status-completed' : 'status-pending'}`}></div>
                                        <span>{agent}</span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Error */}
                    {error && (
                        <div className="glass-effect error-box">
                            <div className="error-content">
                                <span style={{fontSize: '1.5rem'}}>⚠️</span>
                                <div>
                                    <h3 className="error-title">Error</h3>
                                    <p className="error-text">{error}</p>
                                    <p className="error-hint">Make sure the API server is running at {API_URL}</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Results */}
                    {result && (
                        <div className="results-container">
                            {/* Decision Summary */}
                            <div className="glass-effect card">
                                <div className="decision-card">
                                    <div className="decision-text">
                                        <h2 className={`decision-title ${getDecisionColor(result.decision)}`}>
                                            {result.decision}
                                        </h2>
                                        <p className="decision-subtitle">{decision}</p>
                                    </div>
                                    <div className="confidence-badge">
                                        <div className={`confidence-score gradient-text`}>
                                            {result.confidence_score}
                                        </div>
                                        <div className="confidence-label">Confidence</div>
                                    </div>
                                </div>
                                
                                <div className="progress-bar">
                                    <div 
                                        className={`progress-fill ${getConfidenceColor(result.confidence_score)}`}
                                        style={{ width: `${result.confidence_score}%` }}
                                    ></div>
                                </div>
                            </div>

                            {/* Opportunities & Risks */}
                            <div className="grid-2">
                                <div className="glass-effect card">
                                    <div className="section-header">
                                        <span className="section-icon">✨</span>
                                        <h3 className="section-title text-green">Opportunities</h3>
                                    </div>
                                    <div className="list">
                                        {result.opportunities.map((opp, idx) => (
                                            <div key={idx} className="list-item">
                                                <span className="list-number text-green">{idx + 1}.</span>
                                                <span className="list-text">{opp}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="glass-effect card">
                                    <div className="section-header">
                                        <span className="section-icon">⚠️</span>
                                        <h3 className="section-title text-red">Risks</h3>
                                    </div>
                                    <div className="list">
                                        {result.risks.map((risk, idx) => (
                                            <div key={idx} className="list-item">
                                                <span className="list-number text-red">{idx + 1}.</span>
                                                <span className="list-text">{risk}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>

                            {/* Financial Summary */}
                            <div className="glass-effect card">
                                <div className="section-header">
                                    <span className="section-icon">💰</span>
                                    <h3 className="section-title text-blue">Financial Analysis</h3>
                                </div>
                                <div className="grid-4">
                                    <div className="financial-card bg-blue-light">
                                        <div className="financial-label">Investment</div>
                                        <div className="financial-value">{result.financial_summary.investment}</div>
                                    </div>
                                    <div className="financial-card bg-green-light">
                                        <div className="financial-label">ROI Projection</div>
                                        <div className="financial-value">{result.financial_summary.roi_projection}</div>
                                    </div>
                                    <div className="financial-card bg-purple-light">
                                        <div className="financial-label">Breakeven</div>
                                        <div className="financial-value">{result.financial_summary.breakeven}</div>
                                    </div>
                                    <div className="financial-card bg-yellow-light">
                                        <div className="financial-label">Uncertainty</div>
                                        <div className="financial-value" style={{textTransform: 'capitalize'}}>
                                            {result.financial_summary.uncertainty}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Reasoning */}
                            <div className="glass-effect card">
                                <div className="section-header">
                                    <span className="section-icon">🧠</span>
                                    <h3 className="section-title text-purple">Executive Summary</h3>
                                </div>
                                <p className="reasoning-text">{result.reasoning_summary}</p>
                            </div>
                        </div>
                    )}

                    {/* Footer */}
                    <div className="footer">
                        <p></p>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
